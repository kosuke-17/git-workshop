<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>私たちのカフェ</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #ffffff;
        color: #333333;
        margin: 0;
        padding: 0;
      }

      /* ヒーローセクション */
      .hero {
        background-color: #f5f5f5;
        padding: 60px 40px;
        text-align: center;
      }

      h1 {
        font-size: 2.4rem;
        color: #333333;
        margin: 0 0 12px;
      }

      .tagline {
        font-size: 1.1rem;
        color: #666666;
        margin: 0;
      }

      /* メニューセクション */
      .menu-section {
        max-width: 600px;
        margin: 48px auto;
        padding: 0 24px;
      }

      .menu-section h2 {
        font-size: 1.4rem;
        color: #333333;
        border-bottom: 2px solid #dddddd;
        padding-bottom: 8px;
      }

      .menu-section ul {
        list-style: none;
        padding: 0;
      }

      .menu-section li {
        padding: 10px 0;
        border-bottom: 1px solid #eeeeee;
        color: #444444;
      }

      /* フッター */
      footer {
        margin-top: 80px;
        padding: 24px;
        text-align: center;
        background-color: #f9f9f9;
        color: #999999;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>私たちのカフェ</h1>
      <p class="tagline">ゆっくりとした時間をお過ごしください</p>
    </div>

    <div class="menu-section">
      <h2>メニュー</h2>
      <ul>
        <li>コーヒー — ¥500</li>
        <li>紅茶 — ¥450</li>
        <li>ケーキ — ¥600</li>
      </ul>
    </div>

    <footer>
      <p>営業時間: 10:00 - 20:00</p>
      <p>© 2024 私たちのカフェ</p>
    </footer>
  </body>
</html>
